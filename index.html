<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Simulador de Pontuação</title>

    <!-- Ícones e Configurações para virar App (PWA) -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Simulador de Pontuação">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">

    <!-- Tailwind CSS para um visual moderno e limpo -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Melhorias de Renderização e Animações Premium */
        body { 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }
        .active-tab { 
            border-bottom-width: 4px; border-color: #1e40af; color: #1e40af; font-weight: bold; 
        }
        
        /* Botões de Ação com Efeito Tátil Avançado */
        .btn-sim, .btn-nao { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-sim:active, .btn-nao:active { transform: scale(0.92); }
        
        .btn-sim.active { 
            background-color: #16a34a; color: white; border-color: #16a34a; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
            transform: scale(0.96);
        }
        .btn-nao.active { 
            background-color: #dc2626; color: white; border-color: #dc2626; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
            transform: scale(0.96);
        }
        
        /* Campos de Input Suaves */
        input:focus + .fa-user, input:focus + .fa-shop { color: #2563eb; transition: color 0.3s; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-12 selection:bg-blue-200">

            </div>
            <div class="group">

                        <i class="fa-solid fa-shop text-xs"></i>

                        { id: 'kbd_pampers_premium', name: 'Pampers % Pants + Premium', scores: {'C&C':1.5, 'DPP':3, 'HSM':1.5, 'HFS':0, 'PERF':1.0} },
                        { id: 'kbd_pampers_vnight', name: 'Pampers Vale Night', scores: {'C&C':1.5, 'DPP':3, 'HSM':1.5, 'HFS':3, 'PERF':3.0} },
                        { id: 'kbd_downy_grandes', name: 'Downy tam. Grandes', scores: {'C&C':2, 'DPP':0, 'HSM':2, 'HFS':1, 'PERF':0} },
                        { id: 'kbd_downy_colorido', name: 'Downy Bloco Colorido', scores: {'C&C':2, 'DPP':0, 'HSM':2, 'HFS':1, 'PERF':0} },
                        { id: 'kbd_downy_azul', name: 'Downy Bloco Azul', scores: {'C&C':2, 'DPP':0, 'HSM':2, 'HFS':1, 'PERF':0} },
                        { id: 'kbd_gillette_sist25', name: 'Gillette sistemas 25%', scores: {'C&C':2, 'DPP':0, 'HSM':0, 'HFS':0, 'PERF':0} },
                        { id: 'kbd_gillette_sist35', name: 'Gillette sistemas 35%', scores: {'C&C':0, 'DPP':0, 'HSM':1.5, 'HFS':1.5, 'PERF':3.0} },
                        { id: 'kbd_gillette_grandes', name: 'Gillette tamanhos grandes', scores: {'C&C':2, 'DPP':2, 'HSM':1.5, 'HFS':1.5, 'PERF':3.0} },
                        { id: 'kbd_gillette_m3', name: 'Gillette carga m3', scores: {'C&C':0, 'DPP':2, 'HSM':0, 'HFS':0, 'PERF':0} },
                        { id: 'kbd_venus_sist', name: 'Venus sistemas', scores: {'C&C':2, 'DPP':0, 'HSM':1.5, 'HFS':1, 'PERF':0} },
                        { id: 'kbd_venus_pcontato', name: 'Venus pontos de contato', scores: {'C&C':0, 'DPP':1, 'HSM':0, 'HFS':0, 'PERF':3.0} },
                        { id: 'kbd_venus_iara', name: 'Venus iara no cko', scores: {'C&C':3, 'DPP':3, 'HSM':3, 'HFS':3, 'PERF':0} },
                        { id: 'kbd_secret_2band', name: 'Secret 2bandejas', scores: {'C&C':0, 'DPP':3, 'HSM':0, 'HFS':0, 'PERF':0} },
                        { id: 'kbd_secret_3band', name: 'Secret 15frentes/3bandejas', scores: {'C&C':3, 'DPP':0, 'HSM':3, 'HFS':0, 'PERF':3.0} },
                        { id: 'kbd_always_suave', name: 'Always % suave', scores: {'C&C':2, 'DPP':2, 'HSM':2, 'HFS':1, 'PERF':3.0} }
                    ]
                }
            }
        };

        const colors = { SOS: 'bg-amber-500', CKO: 'bg-fuchsia-600', PE: 'bg-blue-600', KBDs: 'bg-emerald-500' };

        function changeModel(model) {
            currentModel = model;
            
            // Botões do Modelo - Aplicação de estilos ativos premium
            const activeClass = 'flex-1 py-3 text-center font-bold text-sm rounded-xl transition-all text-blue-900 bg-blue-50 border border-blue-200 shadow-sm transform scale-100 ring-1 ring-blue-500/20';
            const inactiveClass = 'flex-1 py-3 text-center font-bold text-sm rounded-xl transition-all text-slate-400 bg-white border border-transparent hover:bg-slate-50 hover:text-slate-600 transform hover:scale-[1.01]';
            
            document.getElementById('btn-model-lego').className = model === 'lego' ? activeClass : inactiveClass;
            document.getElementById('btn-model-store').className = model === 'storeplatform' ? activeClass : inactiveClass;
            
            currentChannel = db[model].channels[0];
            buildChannels();
            buildForm();
            calculateScores();
        }

        function buildChannels() {
            const container = document.getElementById('channel-container');
            container.innerHTML = '';
            db[currentModel].channels.forEach(ch => {
                const active = ch === currentChannel 
                    ? 'bg-slate-800 text-white shadow-md ring-2 ring-slate-800/50 transform scale-100' 
                    : 'bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-900';
                container.innerHTML += `<button onclick="setChannel('${ch}')" class="py-2.5 text-center text-xs font-bold rounded-xl transition-all duration-200 ${active}">${ch}</button>`;
            });
        }

        function setChannel(ch) {
            currentChannel = ch;
            buildChannels();
            buildForm();
            calculateScores();
        }

        function buildForm() {
            const container = document.getElementById('checklist-form');
            container.innerHTML = '';
            
            const sections = db[currentModel].items;
            for (let sectionName in sections) {
                let htmlContent = '';
                
                sections[sectionName].forEach(item => {
                    const val = item.scores[currentChannel] || 0;
                    
                    if (val > 0) {
                        htmlContent += `
                            <div class="p-4 flex items-center justify-between gap-3 hover:bg-slate-50/50 transition-colors">
                                <div class="flex-1">
                                    <p class="text-[14px] font-semibold text-slate-800 leading-snug">${item.name}</p>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-wider">Peso: ${val} pts</p>
                                </div>
                                <div class="flex gap-2 shrink-0">
                                    <button onclick="setResponse('${item.id}', true)" id="btn-sim-${item.id}" class="btn-sim w-14 py-2 border border-slate-200 rounded-lg text-xs font-bold text-slate-400 bg-white hover:border-green-400 hover:text-green-600 ${responses[item.id] === true ? 'active' : ''}">SIM</button>
                                    <button onclick="setResponse('${item.id}', false)" id="btn-nao-${item.id}" class="btn-nao w-14 py-2 border border-slate-200 rounded-lg text-xs font-bold text-slate-400 bg-white hover:border-red-400 hover:text-red-600 ${responses[item.id] === false ? 'active' : ''}">NÃO</button>
                                </div>
                            </div>
                        `;
                    }
                });

                if (htmlContent !== '') {
                    let htmlHeader = `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden mb-4">
                            <div class="${colors[sectionName]} px-5 py-3 text-white font-bold text-sm tracking-widest flex justify-between items-center shadow-sm">
                                <span>${sectionName === 'CKO' ? 'CKO / CKT' : sectionName}</span>
                                <span class="text-xs bg-white/20 px-2.5 py-1 rounded-md shadow-inner backdrop-blur-sm" id="section-total-${sectionName}">0 pts</span>
                            </div>
                            <div class="divide-y divide-slate-100">
                    `;
                    container.innerHTML += htmlHeader + htmlContent + `</div></div>`;
                }
            }
        }

        function setResponse(id, value) {
            responses[id] = value;
            
            const btnSim = document.getElementById(`btn-sim-${id}`);
            const btnNao = document.getElementById(`btn-nao-${id}`);
            
            if (value) {
                btnSim.classList.add('active');
                btnNao.classList.remove('active');
            } else {
                btnSim.classList.remove('active');
                btnNao.classList.add('active');
            }
            calculateScores();
        }

        function calculateScores() {
            let totals = { SOS: { got: 0, max: 0 }, CKO: { got: 0, max: 0 }, PE: { got: 0, max: 0 }, KBDs: { got: 0, max: 0 } };
            
            const sections = db[currentModel].items;
            for (let sec in sections) {
                sections[sec].forEach(item => {
                    const weight = item.scores[currentChannel] || 0;
                    if (weight > 0) {
                        totals[sec].max += weight;
                        if (responses[item.id] === true) {
                            totals[sec].got += weight;
                        }
                    }
                });
                
                const lbl = document.getElementById(`section-total-${sec}`);
                if (lbl) lbl.innerText = `${totals[sec].got} / ${totals[sec].max} pts`;
            }

            document.getElementById('dash-sos').innerText = `${totals.SOS.got} / ${totals.SOS.max}`;
            document.getElementById('dash-cko').innerText = `${totals.CKO.got} / ${totals.CKO.max}`;
            document.getElementById('dash-pe').innerText = `${totals.PE.got} / ${totals.PE.max}`;
            document.getElementById('dash-kbds').innerText = `${totals.KBDs.got} / ${totals.KBDs.max}`;
            
            const grandTotalGot = totals.SOS.got + totals.CKO.got + totals.PE.got + totals.KBDs.got;
            const grandTotalMax = totals.SOS.max + totals.CKO.max + totals.PE.max + totals.KBDs.max;
            
            document.getElementById('dash-total').innerText = `${grandTotalGot} / ${grandTotalMax}`;

            updateClassification(grandTotalGot);
        }

        function updateClassification(pontos) {
            const badge = document.getElementById('status-badge');
            const bar = document.getElementById('status-bar');
            
            let colorClass = '';
            let textClass = 'text-white';
            let barWidth = '0%';

            if (pontos > 90) {
                currentStatusText = 'PERFEITA';
                colorClass = 'bg-gradient-to-r from-green-500 to-green-400';
                barWidth = '100%';
            } else if (pontos > 65) {
                currentStatusText = 'BOA';
                colorClass = 'bg-gradient-to-r from-blue-600 to-blue-400';
                barWidth = '75%';
            } else if (pontos > 35) {
                currentStatusText = 'REGULAR';
                colorClass = 'bg-gradient-to-r from-yellow-500 to-amber-400';
                textClass = 'text-amber-950';
                barWidth = '50%';
            } else {
                currentStatusText = 'RUIM';
                colorClass = 'bg-gradient-to-r from-red-600 to-red-500';
                barWidth = pontos > 0 ? '25%' : '0%';
                if(pontos === 0) {
                    currentStatusText = 'AGUARDANDO';
                    colorClass = 'bg-slate-300';
                    textClass = 'text-slate-600';
                }
            }

            badge.className = `inline-block px-10 py-1.5 rounded-full font-black text-sm tracking-widest shadow-sm transition-all duration-300 ${colorClass} ${textClass}`;
            badge.innerText = currentStatusText;
            
            bar.className = `h-2 rounded-full transition-all duration-700 ease-out relative overflow-hidden ${colorClass}`;
            bar.style.width = barWidth;
        }

        function clearForm() {
            if(confirm("Deseja mesmo zerar todo o questionário atual?")) {
                responses = {};
                document.getElementById('input-promotor').value = '';
                document.getElementById('input-loja').value = '';
                buildForm();
                calculateScores();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // ==========================================
        // GERAÇÃO DO ARQUIVO HTML PREMIUM
        // ==========================================
        function downloadHTML() {
            const promotor = document.getElementById('input-promotor').value.trim() || 'Não Informado';
            const loja = document.getElementById('input-loja').value.trim() || 'Não Informado';
            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');
            const horaStr = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            const lojaLimpa = loja.replace(/[^a-zA-Z0-9]/g, '_');
            const dataInversa = agora.toISOString().split('T')[0];
            const nomeArquivo = `Auditoria_${lojaLimpa}_${dataInversa}.html`;

            let totals = { SOS: { got: 0, max: 0 }, CKO: { got: 0, max: 0 }, PE: { got: 0, max: 0 }, KBDs: { got: 0, max: 0 } };
            const sections = db[currentModel].items;
            
            let listSim = '';
            let listNao = '';

            for (let sec in sections) {
                sections[sec].forEach(item => {
                    const weight = item.scores[currentChannel] || 0;
                    if (weight > 0) {
                        totals[sec].max += weight;
                        const labelSec = sec === 'CKO' ? 'CKO/CKT' : sec;
                        if (responses[item.id] === true) {
                            totals[sec].got += weight;
                            listSim += `<li><span class="cat">[${labelSec}]</span> <span class="name">${item.name}</span> <span class="pts pts-sim">+${weight} pts</span></li>`;
                        } else if (responses[item.id] === false) {
                            listNao += `<li><span class="cat">[${labelSec}]</span> <span class="name">${item.name}</span> <span class="pts pts-nao">0 pts</span></li>`;
                        }
                    }
                });
            }
            
            const totalGot = totals.SOS.got + totals.CKO.got + totals.PE.got + totals.KBDs.got;
            const totalMax = totals.SOS.max + totals.CKO.max + totals.PE.max + totals.KBDs.max;
            
            let bgGradient = 'linear-gradient(135deg, #9ca3af, #cbd5e1)'; 
            let textColor = '#ffffff';
            if (totalGot > 90) { bgGradient = 'linear-gradient(135deg, #16a34a, #4ade80)'; }
            else if (totalGot > 65) { bgGradient = 'linear-gradient(135deg, #2563eb, #60a5fa)'; }
            else if (totalGot > 35) { bgGradient = 'linear-gradient(135deg, #eab308, #fde047)'; textColor = '#713f12'; }
            else if (totalGot > 0) { bgGradient = 'linear-gradient(135deg, #dc2626, #f87171)'; }

            const htmlString = `
            <!DOCTYPE html>
            <html lang="pt-BR">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Relatório de Auditoria - ${loja}</title>
                <style>
                    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 20px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
                    .container { max-width: 800px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); border: 1px solid #f1f5f9; }
                    .header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid #e2e8f0; padding-bottom: 30px; }
                    .header h1 { color: #0f172a; margin: 0 0 8px 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
                    .header p { color: #64748b; margin: 0; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
                    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px; background: #f8fafc; padding: 25px; border-radius: 16px; border: 1px solid #f1f5f9; }
                    .info-item { font-size: 15px; color: #475569; }
                    .info-item strong { color: #0f172a; display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; color: #94a3b8; }
                    .score-box { border-radius: 16px; padding: 35px; text-align: center; margin-bottom: 40px; position: relative; overflow: hidden; background: #0f172a; color: white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
                    .score-box h2 { margin: 0 0 15px 0; font-size: 12px; color: #94a3b8; letter-spacing: 2px; }
                    .score-value { font-size: 64px; font-weight: 900; line-height: 1; margin-bottom: 25px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
                    .score-value span { font-size: 28px; color: #64748b; font-weight: 600; }
                    .badge { display: inline-block; background: ${bgGradient}; color: ${textColor}; padding: 10px 35px; border-radius: 9999px; font-weight: 800; font-size: 15px; letter-spacing: 1.5px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
                    .list-section { margin-bottom: 35px; }
                    .list-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
                    .title-sim { color: #16a34a; border-color: #bbf7d0; }
                    .title-nao { color: #dc2626; border-color: #fecaca; }
                    ul.items { list-style: none; padding: 0; margin: 0; }
                    ul.items li { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; transition: background 0.2s; border-radius: 8px; }
                    ul.items li:hover { background: #f8fafc; }
                    .cat { font-weight: 700; width: 100px; flex-shrink: 0; color: #64748b; font-size: 12px; letter-spacing: 0.5px; }
                    .name { flex-grow: 1; font-size: 15px; font-weight: 500; color: #1e293b; }
                    .pts { font-weight: 800; font-size: 14px; background: white; padding: 4px 10px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
                    .pts-sim { color: #16a34a; border: 1px solid #bbf7d0; }
                    .pts-nao { color: #94a3b8; border: 1px solid #e2e8f0; }
                    .empty { color: #94a3b8; font-style: italic; font-size: 15px; padding: 20px !important; justify-content: center; background: #f8fafc; border: 1px dashed #cbd5e1 !important; }
                    @media (max-width: 600px) {
                        .container { padding: 20px; }
                        .info-grid { grid-template-columns: 1fr; gap: 15px; }
                        ul.items li { flex-direction: column; align-items: flex-start; gap: 8px; }
                        .cat { width: auto; }
                        .pts { align-self: flex-start; }
                    }
                </style>
            </head>
            <body>
                <div class="container">
                    <div class="header">
                        <p>Simulador de Performance</p>
                        <h1>Relatório Final de Execução</h1>
                    </div>

                    <div class="info-grid">
                        <div class="info-item"><strong>Promotor de Vendas</strong> ${promotor}</div>
                        <div class="info-item"><strong>Data da Auditoria</strong> ${dataStr} às ${horaStr}</div>
                        <div class="info-item"><strong>Ponto de Venda (PDV)</strong> ${loja}</div>
                        <div class="info-item"><strong>Modelo e Canal</strong> ${modelNames[currentModel]} — ${currentChannel}</div>
                    </div>

                    <div class="score-box">
                        <h2>SCORE ATINGIDO</h2>
                        <div class="score-value">${totalGot} <span>/ ${totalMax}</span></div>
                        <div class="badge">${currentStatusText}</div>
                    </div>

                    <div class="list-section">
                        <div class="list-title title-sim">✅ Itens Executados</div>
                        <ul class="items">
                            ${listSim || '<li class="empty">Nenhum item marcado como SIM.</li>'}
                        </ul>
                    </div>

                    <div class="list-section">
                        <div class="list-title title-nao">❌ Itens Pendentes</div>
                        <ul class="items">
                            ${listNao || '<li class="empty">Nenhum item marcado como NÃO.</li>'}
                        </ul>
                    </div>
                </div>
            </body>
            </html>
            `;

            const blob = new Blob([htmlString], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = nomeArquivo;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ==========================================
        // ENVIO DIRETO PARA O WHATSAPP
        // ==========================================
        function shareReport() {
            const promotor = document.getElementById('input-promotor').value.trim() || 'Não Informado';
            const loja = document.getElementById('input-loja').value.trim() || 'Não Informado';
            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');
            const horaStr = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            let totals = { SOS: { got: 0, max: 0 }, CKO: { got: 0, max: 0 }, PE: { got: 0, max: 0 }, KBDs: { got: 0, max: 0 } };
            const sections = db[currentModel].items;
            
            for (let sec in sections) {
                sections[sec].forEach(item => {
                    const weight = item.scores[currentChannel] || 0;
                    if (weight > 0) {
                        totals[sec].max += weight;
                        if (responses[item.id] === true) totals[sec].got += weight;
                    }
                });
            }
            
            const totalGot = totals.SOS.got + totals.CKO.got + totals.PE.got + totals.KBDs.got;
            const totalMax = totals.SOS.max + totals.CKO.max + totals.PE.max + totals.KBDs.max;

            let statusEmoji = '⚪';
            if (totalGot > 90) statusEmoji = '🟢';
            else if (totalGot > 65) statusEmoji = '🔵';
            else if (totalGot > 35) statusEmoji = '🟡';
            else if (totalGot > 0) statusEmoji = '🔴';

            let text = `📊 *AUDITORIA DE LOJA*\n`;
            text += `👤 *Promotor:* ${promotor}\n`;
            text += `🏪 *Loja:* ${loja}\n`;
            text += `📅 *Data:* ${dataStr} às ${horaStr}\n`;
            text += `🏢 *Modelo:* ${modelNames[currentModel]} | *Canal:* ${currentChannel}\n`;
            text += `----------------------------------\n`;
            if(totals.SOS.max > 0) text += `🔸 *SOS:* ${totals.SOS.got}/${totals.SOS.max}\n`;
            if(totals.CKO.max > 0) text += `🔸 *CKO/CKT:* ${totals.CKO.got}/${totals.CKO.max}\n`;
            if(totals.PE.max > 0) text += `🔸 *PE:* ${totals.PE.got}/${totals.PE.max}\n`;
            if(totals.KBDs.max > 0) text += `🔸 *KBDs:* ${totals.KBDs.got}/${totals.KBDs.max}\n`;
            text += `----------------------------------\n`;
            text += `🏆 *TOTAL:* *${totalGot}* / ${totalMax} pts\n`;
            text += `${statusEmoji} *STATUS:* *${currentStatusText}*\n`;
            text += `----------------------------------\n`;
            text += `_Gerado via Simulador de Pontuação_`;

            // Abre o link direto do WhatsApp
            const urlWhatsApp = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(urlWhatsApp, '_blank');
        }

        // Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        // Inicia o app
        changeModel('lego');
    </script>
</body>
</html>
